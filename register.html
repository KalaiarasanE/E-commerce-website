<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore | Create Account</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/dark-theme.css">
    <style>
        .auth-container-layout {
            max-width: 480px;
            margin: 60px auto;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--card-shadow);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <!-- Header logo home link -->
    <header style="padding: 24px 0; text-align: center; border-bottom:1px solid var(--border-color); background-color: var(--bg-secondary);">
        <a href="index.html" class="logo" style="display:inline-flex; font-size:1.8rem;"><i class="fas fa-shopping-bag"></i> EliteStore</a>
    </header>

    <main class="container">
        <div class="auth-container-layout animate-fade-in-up">
            <div class="auth-header">
                <h2 style="font-weight: 800; font-size: 1.8rem;">Create Account</h2>
                <p style="color:var(--text-secondary); font-size:0.9rem; margin-top:4px;">Join the elite marketplace shopping experience</p>
            </div>

            <form id="registerForm" autocomplete="off">
                <div class="form-group">
                    <label class="form-label" for="registerName">Full Name</label>
                    <input type="text" class="form-input" id="registerName" placeholder="e.g. Kalaiarasan E" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="registerEmail">Email Address</label>
                    <input type="email" class="form-input" id="registerEmail" placeholder="name@domain.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="registerPassword">Password</label>
                    <input type="password" class="form-input" id="registerPassword" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="registerConfirmPassword">Confirm Password</label>
                    <input type="password" class="form-input" id="registerConfirmPassword" placeholder="••••••••" required>
                </div>

                <div style="margin-bottom:24px;">
                    <label class="form-checkbox">
                        <input type="checkbox" id="agreeTerms" required>
                        <span style="font-size:0.85rem;">I agree to the <a href="#" style="color:var(--primary); font-weight:600;">Terms & Conditions</a> and <a href="#" style="color:var(--primary); font-weight:600;">Privacy Policy</a></span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding:14px; margin-bottom:20px;">Register Profile</button>
            </form>

            <div class="text-center" style="font-size:0.9rem; color:var(--text-secondary);">
                Already have an account? <a href="login.html" style="color:var(--primary); font-weight:700;">Sign In</a>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/notifications.js"></script>
    <script src="js/products.js"></script>
    <script src="js/search.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
