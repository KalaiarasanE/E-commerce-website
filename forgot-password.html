<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore | Recover Profile Password</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/dark-theme.css">
    <style>
        .auth-container-layout {
            max-width: 480px;
            margin: 80px auto;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--card-shadow);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        /* OTP Digits input row layout */
        .otp-digits-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin: 20px 0;
        }
        .otp-digit-input {
            width: 60px;
            height: 60px;
            font-size: 1.8rem;
            text-align: center;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-weight: 700;
        }
        .otp-digit-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }
    </style>
</head>
<body>

    <!-- Header Logo Home Link -->
    <header style="padding: 24px 0; text-align: center; border-bottom:1px solid var(--border-color); background-color: var(--bg-secondary);">
        <a href="index.html" class="logo" style="display:inline-flex; font-size:1.8rem;"><i class="fas fa-shopping-bag"></i> EliteStore</a>
    </header>

    <main class="container">
        <div class="auth-container-layout animate-fade-in-up">
            
            <!-- PANEL 1: EMAIL REQUEST FORM -->
            <div id="emailFormPanel">
                <div class="auth-header">
                    <h2 style="font-weight: 800; font-size: 1.8rem;">Forgot Password</h2>
                    <p style="color:var(--text-secondary); font-size:0.9rem; margin-top:4px;">Enter your email to verify profile credentials</p>
                </div>
                <form id="forgotPasswordForm" autocomplete="off">
                    <div class="form-group">
                        <label class="form-label" for="forgotEmail">Email Address</label>
                        <input type="email" class="form-input" id="forgotEmail" placeholder="name@domain.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding:14px; margin-bottom:20px;">Send Verification Code</button>
                </form>
            </div>

            <!-- PANEL 2: OTP VERIFICATION GRID (Initially Hidden) -->
            <div id="otpFormPanel" style="display:none;">
                <div class="auth-header">
                    <h2 style="font-weight: 800; font-size: 1.8rem;">Verify OTP</h2>
                    <p style="color:var(--text-secondary); font-size:0.9rem; margin-top:4px;">We sent a 4-digit code to your email. Enter it below.</p>
                </div>
                <form id="otpVerificationForm" autocomplete="off">
                    <div class="otp-digits-row">
                        <input type="text" class="otp-digit-input" maxlength="1" required>
                        <input type="text" class="otp-digit-input" maxlength="1" required>
                        <input type="text" class="otp-digit-input" maxlength="1" required>
                        <input type="text" class="otp-digit-input" maxlength="1" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding:14px; margin-bottom:20px;">Verify Code</button>
                    <div style="font-size:0.85rem; color:var(--text-secondary); text-align:center;">
                        Didn't receive the email? <a href="#" style="color:var(--primary); font-weight:700;" onclick="window.showToast('New OTP Resent!', 'success')">Resend Code</a>
                    </div>
                </form>
            </div>

            <!-- PANEL 3: NEW PASSWORD INPUT FIELDS (Initially Hidden) -->
            <div id="resetFormPanel" style="display:none;">
                <div class="auth-header">
                    <h2 style="font-weight: 800; font-size: 1.8rem;">Reset Password</h2>
                    <p style="color:var(--text-secondary); font-size:0.9rem; margin-top:4px;">Create a strong new password for your account</p>
                </div>
                <form id="resetPasswordForm" autocomplete="off">
                    <div class="form-group">
                        <label class="form-label" for="newPassword">New Password</label>
                        <input type="password" class="form-input" id="newPassword" placeholder="Minimum 6 characters" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="confirmNewPassword">Confirm New Password</label>
                        <input type="password" class="form-input" id="confirmNewPassword" placeholder="Match new password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding:14px; margin-bottom:20px;">Update Password</button>
                </form>
            </div>

            <div class="text-center" style="font-size:0.9rem; color:var(--text-secondary); border-top:1px solid var(--border-color); padding-top:20px; margin-top:20px;">
                Remembered details? <a href="login.html" style="color:var(--primary); font-weight:700;">Back to Sign In</a>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/notifications.js"></script>
    <script src="js/products.js"></script>
    <script src="js/search.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
