<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore | Order Tracking</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/dark-theme.css">
    <style>
        .step-bullet {
            transition: all 0.3s ease;
        }
        .tracking-step.active .step-bullet {
            box-shadow: 0 0 0 6px var(--primary-glow);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="main-header">
        <div class="header-main">
            <div class="container">
                <button class="hamburger-menu"><i class="fas fa-bars"></i></button>
                <a href="index.html" class="logo"><i class="fas fa-shopping-bag"></i> EliteStore</a>
                <div class="header-actions">
                    <button class="action-btn theme-toggle-btn"><i class="fas fa-moon"></i></button>
                    <a href="cart.html" class="action-btn"><i class="fas fa-shopping-bag"></i></a>
                    <a href="profile.html" class="action-btn"><i class="far fa-user"></i></a>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN TRACKING TIMELINE -->
    <main class="container section-padding" style="max-width: 800px;">
        <a href="orders.html" style="color:var(--primary); font-weight:700; display:inline-flex; align-items:center; gap:8px;"><i class="fas fa-arrow-left"></i> Back to My Orders</a>
        
        <!-- Target for dynamic tracking data -->
        <div id="orderTrackingStatus"></div>
    </main>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="container text-center" style="padding-bottom:30px;">
            <p>&copy; 2026 EliteStore Clone. Built by **Kalaiarasan E**. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/notifications.js"></script>
    <script src="js/products.js"></script>
    <script src="js/search.js"></script>
    <script src="js/app.js"></script>
    <script src="js/orders.js"></script>
</body>
</html>
